<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Yuzuki Galaxy 💫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff006e;
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
        }
        
        .font-display {
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Glitch animation */
        .glitch {
            position: relative;
            animation: glitch-skew 3s infinite linear alternate-reverse;
        }
        
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #00f0ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #ff006e, 2px 2px #00f0ff;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }
        
        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            20% { clip: rect(80px, 9999px, 90px, 0); }
            40% { clip: rect(10px, 9999px, 50px, 0); }
            60% { clip: rect(60px, 9999px, 20px, 0); }
            80% { clip: rect(40px, 9999px, 70px, 0); }
            100% { clip: rect(90px, 9999px, 30px, 0); }
        }
        
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            20% { clip: rect(50px, 9999px, 20px, 0); }
            40% { clip: rect(90px, 9999px, 60px, 0); }
            60% { clip: rect(20px, 9999px, 40px, 0); }
            80% { clip: rect(70px, 9999px, 10px, 0); }
            100% { clip: rect(30px, 9999px, 90px, 0); }
        }
        
        /* Floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        
        /* Pulse glow */
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 110, 0.8), 0 0 60px rgba(255, 0, 110, 0.4); }
        }
        
        /* Star twinkle */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .star {
            position: absolute;
            color: #ff006e;
            animation: twinkle 3s infinite;
        }
        
        /* Grid background */
        .grid-bg {
            background-image: 
                linear-gradient(rgba(255, 0, 110, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 110, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        /* Scanline */
        .scanline {
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(255, 0, 110, 0.02) 50%
            );
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative">

    <!-- Background Elements -->
    <div class="absolute inset-0 grid-bg"></div>
    <div class="absolute inset-0 scanline pointer-events-none"></div>
    
    <!-- Floating Stars -->
    <div class="star top-20 left-20 text-2xl" style="animation-delay: 0s;">✦</div>
    <div class="star top-32 right-32 text-xl" style="animation-delay: 0.5s;">✦</div>
    <div class="star bottom-40 left-40 text-lg" style="animation-delay: 1s;">✦</div>
    <div class="star bottom-20 right-20 text-2xl" style="animation-delay: 1.5s;">✦</div>
    <div class="star top-1/2 left-10 text-sm" style="animation-delay: 2s;">✦</div>
    <div class="star top-1/3 right-16 text-xl" style="animation-delay: 2.5s;">✦</div>

    <!-- Main Content -->
    <div class="relative z-10 text-center px-4">
        
        <!-- Galaxy Icon -->
        <div class="mb-8 floating">
            <span class="text-6xl md:text-8xl">🌌</span>
        </div>
        
        <!-- Welcome Text -->
        <h1 class="font-display text-4xl md:text-6xl lg:text-7xl font-black text-white mb-4 tracking-widest glitch" data-text="WELCOME TO">
            WELCOME TO
        </h1>
        
        <!-- Yuzuki Galaxy -->
        <div class="mb-12">
            <span class="font-display text-5xl md:text-7xl lg:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-pink-500 animate-pulse">
                YUZUKI GALAXY
            </span>
        </div>
        
        <!-- Decorative Line -->
        <div class="w-32 h-1 bg-gradient-to-r from-transparent via-pink-500 to-transparent mx-auto mb-12"></div>
        
        <!-- Enter Button -->
        <a href="home.html" class="group relative inline-block">
            <div class="absolute -inset-1 bg-gradient-to-r from-pink-600 to-purple-600 rounded-lg blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 pulse-glow"></div>
            <button class="relative px-12 py-6 bg-black rounded-lg border border-pink-500/50 leading-none flex items-center divide-x divide-pink-600">
                <span class="flex items-center space-x-5">
                    <span class="text-pink-500 text-2xl group-hover:rotate-12 transition-transform">💫</span>
                    <span class="pr-6 text-gray-100 font-display text-lg tracking-widest group-hover:text-pink-400 transition-colors">PRESS ENTER</span>
                </span>
                <span class="pl-6 text-pink-500 group-hover:text-pink-300 font-mono text-sm transition-colors">TO_DEEP_DIVE</span>
            </button>
        </a>
        
        <!-- Subtitle -->
        <p class="mt-8 text-gray-500 font-mono text-sm tracking-widest">
            COSMIC_STAR_COSPLAYER 💫       
 </p>
        
        <!-- Owaling mention -->
        <div class="mt-4 flex items-center justify-center gap-2 text-pink-500/60 text-xs font-mono">
            <span>OWALING_FANBASE</span>
            <span class="animate-pulse">●</span>
            <span>SYSTEM_ONLINE</span>
        </div>
    </div>

    <!-- Corner Decorations -->
    <div class="absolute top-8 left-8 text-pink-500/30 font-mono text-xs">
        <div>COORDINATES: 35.6762° N, 139.6503° E</div>
        <div>STATUS: ONLINE</div>
    </div>
    
    <div class="absolute bottom-8 right-8 text-pink-500/30 font-mono text-xs text-right">
        <div>Cos-Mic Star💫</div>
        <div>OwaOwa</div>
    </div>

    <!-- Keyboard hint -->
    <div class="absolute bottom-12 left-1/2 transform -translate-x-1/2 text-gray-600 font-mono text-xs animate-pulse">
        [ Press ENTER or Click Button ]
    </div>

    <script>
        // Enter key to navigate
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                window.location.href = 'home.html';
            }
        });
        
        // Click anywhere to enter (optional)
        document.addEventListener('click', function(e) {
            if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
